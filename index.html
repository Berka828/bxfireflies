<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bronx Children's Museum - Interactive River</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #webcam { display: none; }
        
        /* The Start Button - Necessary for GitHub/Browsers to allow the camera */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 10; color: white;
        }
        button {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background: #0077be; color: white; border: none; border-radius: 50px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); background: #00aaff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>Bronx Children's Museum</h1>
        <p>Interactive River Exhibit</p>
        <button id="startButton">START EXPERIENCE</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script>
        const startButton = document.getElementById('startButton');
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('webcam');

        // This function starts the whole thing when the button is clicked
        startButton.addEventListener('click', () => {
            overlay.style.display = 'none';
            init();
        });

        function init() {
            // 1. SETUP SCENE
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 120;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. GET WEBCAM
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        createParticles(scene, video);
                    };
                })
                .catch(err => alert("Camera error: " + err));

            // 3. ANIMATION LOOP
            function animate() {
                requestAnimationFrame(animate);
                // The zigzag movement you saw (slow sway)
                camera.position.x = Math.sin(Date.now() * 0.0005) * 30;
                camera.lookAt(0, 0, 0);
                renderer.render(scene, camera);
            }
            animate();
        }

        function createParticles(scene, videoElement) {
            const videoTexture = new THREE.VideoTexture(videoElement);
            
            // Grid of 160x120 particles (better performance for high-scale theater screens)
            const width = 160;
            const height = 120;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(width * height * 3);
            const uvs = new Float32Array(width * height * 2);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x);
                    // Spread particles across the screen
                    positions[i * 3] = (x - width / 2) * 1.5;
                    positions[i * 3 + 1] = (y - height / 2) * 1.5;
                    positions[i * 3 + 2] = 0;

                    // Map webcam to particles
                    uvs[i * 2] = x / width;
                    uvs[i * 2 + 1] = y / height;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

            const material = new THREE.ShaderMaterial({
                uniforms: { u_texture: { value: videoTexture } },
                vertexShader: `
                    uniform sampler2D u_texture;
                    varying vec2 vUv;
                    varying float vBrightness;

                    void main() {
                        vUv = uv;
                        // Flip horizontally for mirror effect
                        vec2 mirrorUv = vec2(1.0 - vUv.x, vUv.y);
                        vec4 color = texture2D(u_texture, mirrorUv);
                        
                        // Calculate how bright this part of the video is
                        vBrightness = (color.r + color.g + color.b) / 3.0;

                        vec3 pos = position;
                        // DRAMATIC EFFECT: Light areas push forward, Dark areas stay back
                        pos.z += vBrightness * 60.0; 

                        gl_PointSize = 4.0 + (vBrightness * 5.0); // Bright parts get bigger
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    varying float vBrightness;

                    void main() {
                        // Create a "Glow" effect
                        float dist = distance(gl_PointCoord, vec2(0.5));
                        if (dist > 0.5) discard;

                        // RIVER COLORS: Deep Blue to Bright Cyan
                        vec3 colorA = vec3(0.0, 0.1, 0.4); // Deep River Blue
                        vec3 colorB = vec3(0.0, 1.0, 0.8); // Glowing Magic Teal
                        
                        vec3 finalColor = mix(colorA, colorB, vBrightness);
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
        }
    </script>
</body>
</html>
