<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seasons of the Bronx - Pro Installation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; cursor: default; }
        /* Hide cursor in fullscreen mode */
        body.kiosk-mode { cursor: none !important; }
        
        #webcam { display: none; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a24 0%, #000 100%);
            z-index: 100; color: white; text-align: center; transition: opacity 0.5s;
        }
        h1 { font-size: 3rem; letter-spacing: 4px; font-weight: 300; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        
        button {
            padding: 20px 50px; font-size: 18px; cursor: pointer; letter-spacing: 2px;
            background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: white; color: black; box-shadow: 0 0 30px rgba(255,255,255,0.4); }
        #status { margin-top: 20px; color: #666; font-size: 14px; }
        
        /* Ensure the GUI sits above the canvas but hides in kiosk mode */
        .dg.ac { z-index: 50 !important; transition: opacity 0.3s; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- dat.GUI for the Admin Board -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>INTERACTIVE MURAL</h1>
        <p>Press 'F' after starting to enter Fullscreen Kiosk Mode</p>
        <button id="startBtn">Initialize Hardware</button>
        <div id="status">System Ready</div>
    </div>

    <video id="webcam" playsinline autoplay muted></video>

    <script>
        const PARTICLE_COUNT = 120000;
        const video = document.getElementById('webcam');
        let scene, camera, renderer, particles, motionTexture;
        let lastFrame;
        
        // --- ADMIN SETTINGS (dat.GUI) ---
        const settings = {
            physicsMode: 0, // 0: Explosion, 1: Vortex, 2: Gravity Drop
            particleSize: 4.0,
            ambientSpeed: 1.0,
            motionSensitivity: 40,
            autoCycleBiomes: true,
            baseColor: '#00ced1',
            accentColor: '#7fff00',
            forceBiomeSwap: () => { cycleBiome(); }
        };

        const biomes = [
            { name: "Spring", base: '#ff69b4', accent: '#98fb98' },
            { name: "Summer", base: '#00ced1', accent: '#7fff00' },
            { name: "Autumn", base: '#ff4500', accent: '#ffd700' },
            { name: "Winter", base: '#4169e1', accent: '#ffffff' }
        ];
        let currentBiome = 1;

        // --- SETUP ADMIN BOARD ---
        const gui = new dat.GUI({ width: 300 });
        const folderVisuals = gui.addFolder('Visual Settings');
        folderVisuals.addColor(settings, 'baseColor').listen();
        folderVisuals.addColor(settings, 'accentColor').listen();
        folderVisuals.add(settings, 'particleSize', 1.0, 10.0);
        folderVisuals.add(settings, 'ambientSpeed', 0.1, 3.0);
        
        const folderInteraction = gui.addFolder('Interaction & Physics');
        folderInteraction.add(settings, 'physicsMode', { 'Explosion (Outward)': 0, 'Vortex (Swirl)': 1, 'Gravity (Fall)': 2 }).name('Physics Response');
        folderInteraction.add(settings, 'motionSensitivity', 10, 100).name('Motion Threshold');
        
        const folderSystem = gui.addFolder('System');
        folderSystem.add(settings, 'autoCycleBiomes').name('Auto-Cycle Seasons');
        folderSystem.add(settings, 'forceBiomeSwap').name('Next Season Now');
        
        folderVisuals.open();
        folderInteraction.open();

        // --- FULLSCREEN KIOSK MODE ('F' KEY) ---
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                    document.body.classList.add('kiosk-mode'); // Hides cursor and GUI
                } else {
                    document.exitFullscreen();
                    document.body.classList.remove('kiosk-mode');
                }
            }
        });

        // --- SYSTEM STARTUP ---
        document.getElementById('startBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.innerText = "Connecting to optical sensor...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                await video.play();
                
                document.getElementById('overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
                
                initWebGL();
            } catch (err) {
                status.innerText = "Error: " + err.message;
                status.style.color = "#ff5555";
            }
        });

        function initWebGL() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Motion Heatmap
            const motionCanvas = document.createElement('canvas');
            motionCanvas.width = 64; motionCanvas.height = 48;
            const mCtx = motionCanvas.getContext('2d');
            motionTexture = new THREE.CanvasTexture(motionCanvas);

            // Create Particles
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            const uvs = new Float32Array(PARTICLE_COUNT * 2);

            for(let i=0; i<PARTICLE_COUNT; i++) {
                pos[i*3] = (Math.random() - 0.5) * 450;
                pos[i*3+1] = (Math.random() - 0.5) * 350;
                pos[i*3+2] = (Math.random() - 0.5) * 50;
                
                uvs[i*2] = (pos[i*3] / 450) + 0.5;
                uvs[i*2+1] = (pos[i*3+1] / 350) + 0.5;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

            // Dynamic Shader
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uMotion: { value: motionTexture },
                    uBaseColor: { value: new THREE.Color(settings.baseColor) },
                    uAccentColor: { value: new THREE.Color(settings.accentColor) },
                    uPhysicsMode: { value: 0.0 },
                    uParticleSize: { value: 4.0 }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform sampler2D uMotion;
                    uniform vec3 uBaseColor;
                    uniform vec3 uAccentColor;
                    uniform float uPhysicsMode;
                    uniform float uParticleSize;

                    varying vec3 vColor;

                    void main() {
                        vec2 motionUv = vec2(1.0 - uv.x, uv.y);
                        float force = texture2D(uMotion, motionUv).r;

                        vec3 p = position;
                        
                        // Ambient Breathing
                        p.x += sin(uTime + position.y * 0.02) * 4.0;
                        p.y += cos(uTime * 0.8 + position.x * 0.02) * 4.0;

                        // --- PHYSICS RESPONSES ---
                        if (uPhysicsMode < 0.5) {
                            // Mode 0: Explosion (Push Outward)
                            p.z += force * 100.0;
                            p.x += (uv.x - 0.5) * force * 60.0;
                            p.y += (uv.y - 0.5) * force * 60.0;
                        } 
                        else if (uPhysicsMode < 1.5) {
                            // Mode 1: Vortex (Swirl)
                            float angle = force * 10.0;
                            float s = sin(angle);
                            float c = cos(angle);
                            // Rotate around Z axis based on force
                            float newX = p.x * c - p.y * s;
                            float newY = p.x * s + p.y * c;
                            p.x = mix(p.x, newX, force);
                            p.y = mix(p.y, newY, force);
                            p.z += force * 40.0;
                        } 
                        else {
                            // Mode 2: Gravity Drop (Melting/Falling)
                            p.y -= force * 300.0 * (abs(sin(uTime + p.x)));
                            p.x += sin(p.y * 0.1) * force * 20.0;
                        }

                        // Color Excitement
                        vColor = mix(uBaseColor, uAccentColor, force * 1.5);
                        
                        vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
                        gl_PointSize = (uParticleSize + force * 15.0) * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = distance(gl_PointCoord, vec2(0.5));
                        if(d > 0.5) discard;
                        gl_FragColor = vec4(vColor, 0.8 * (1.0 - d*2.0));
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            // Motion Capture Loop
            function updateMotion() {
                mCtx.fillStyle = 'black';
                mCtx.globalAlpha = 0.15; // Viscosity of the motion trail
                mCtx.fillRect(0,0,64,48);
                mCtx.globalAlpha = 1.0;

                mCtx.drawImage(video, 0, 0, 64, 48);
                const curr = mCtx.getImageData(0,0,64,48);
                
                if(lastFrame) {
                    mCtx.fillStyle = 'white';
                    for(let i=0; i<curr.data.length; i+=4) {
                        if(Math.abs(curr.data[i] - lastFrame.data[i]) > settings.motionSensitivity) {
                            const x = (i/4)%64; const y = Math.floor((i/4)/64);
                            // Draw motion brush
                            mCtx.beginPath();
                            mCtx.arc(x, y, 1.5, 0, Math.PI * 2);
                            mCtx.fill();
                        }
                    }
                }
                lastFrame = curr;
                motionTexture.needsUpdate = true;
                requestAnimationFrame(updateMotion);
            }
            updateMotion();

            // Auto-Cycle Timer
            setInterval(() => {
                if(settings.autoCycleBiomes) cycleBiome();
            }, 30000);

            animate();
        }

        function cycleBiome() {
            currentBiome = (currentBiome + 1) % biomes.length;
            settings.baseColor = biomes[currentBiome].base;
            settings.accentColor = biomes[currentBiome].accent;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const u = particles.material.uniforms;
            u.uTime.value += 0.01 * settings.ambientSpeed;
            u.uPhysicsMode.value = parseFloat(settings.physicsMode);
            u.uParticleSize.value = parseFloat(settings.particleSize);

            // Smoothly lerp colors based on GUI / Biome settings
            const targetBase = new THREE.Color(settings.baseColor);
            const targetAccent = new THREE.Color(settings.accentColor);
            u.uBaseColor.value.lerp(targetBase, 0.03);
            u.uAccentColor.value.lerp(targetAccent, 0.03);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
