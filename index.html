<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bronx Children's Museum - Aurora Silk</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #webcam { display: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 10; color: white; text-align: center;
        }
        button {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background: #8a2be2; color: white; border: none; border-radius: 50px;
            transition: transform 0.2s; margin-top: 20px;
        }
        button:hover { transform: scale(1.1); background: #9932cc; }
    </style>
    <!-- We need a more recent version of Three.js for this -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="overlay">
        <h1>The Aurora Silk</h1>
        <p>Use slow, sweeping motions to paint with light.</p>
        <button id="startButton">START</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'three';
        import { GPUComputationRenderer } from 'three/addons/renderers/GPUComputationRenderer.js';

        // --- Configuration ---
        const SIZE = 256; // Resolution of the fluid simulation
        const STARDUST_COUNT = 5000;
        const BIOME_CHANGE_INTERVAL = 30000; // 30 seconds

        // --- Biomes (Color Palettes) ---
        const biomes = [
            { name: "Deep River", color: new THREE.Color(0x00aaff) },
            { name: "Dawn Sky", color: new THREE.Color(0xff8c69) },
            { name: "Midnight Forest", color: new THREE.Color(0x9400d3) },
            { name: "Golden Hour", color: new THREE.Color(0xffd700) }
        ];
        let currentBiomeIndex = 0;
        let targetColor = biomes[currentBiomeIndex].color.clone();
        let currentColor = biomes[currentBiomeIndex].color.clone();

        // --- Core Scene Setup ---
        let scene, camera, renderer, video, fluid, stardust;
        const startButton = document.getElementById('startButton');
        const overlay = document.getElementById('overlay');
        const mouse = { x: 0, y: 0, dx: 0, dy: 0, isDown: false };
        
        startButton.addEventListener('click', () => {
            overlay.style.display = 'none';
            init();
        });

        function init() {
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Setup Webcam
            video = document.getElementById('webcam');
            navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    video.onloadedmetadata = () => {
                        setupInteraction();
                        fluid = new FluidSimulation();
                        stardust = new Stardust();
                        setInterval(changeBiome, BIOME_CHANGE_INTERVAL);
                        animate();
                    };
                })
                .catch(err => alert("Camera access is required. Please refresh and allow."));
        }

        // --- Interaction (Optical Flow from Webcam) ---
        function setupInteraction() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let lastFrame;

            video.addEventListener('play', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                function updateMouseFromVideo() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    if (lastFrame) {
                        let maxDiff = -1, avgX = 0, avgY = 0, count = 0;

                        for (let i = 0; i < frame.data.length; i += 4) {
                            const diff = Math.abs(frame.data[i] - lastFrame.data[i]) +
                                         Math.abs(frame.data[i + 1] - lastFrame.data[i + 1]) +
                                         Math.abs(frame.data[i + 2] - lastFrame.data[i + 2]);

                            if (diff > 50) { // Motion threshold
                                const x = (i / 4) % canvas.width;
                                const y = Math.floor((i / 4) / canvas.width);
                                avgX += x;
                                avgY += y;
                                count++;
                            }
                        }

                        if (count > 10) { // Found significant motion
                            const newX = 1 - (avgX / count / canvas.width);
                            const newY = 1 - (avgY / count / canvas.height);
                            mouse.dx = (newX - mouse.x) * 5;
                            mouse.dy = (newY - mouse.y) * 5;
                            mouse.x = newX;
                            mouse.y = newY;
                            stardust.spawn(mouse.x, mouse.y);
                        } else {
                            mouse.dx = 0;
                            mouse.dy = 0;
                        }
                    }
                    lastFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(updateMouseFromVideo);
                }
                updateMouseFromVideo();
            });
        }

        // --- Biome Color Shifting ---
        function changeBiome() {
            currentBiomeIndex = (currentBiomeIndex + 1) % biomes.length;
            targetColor = biomes[currentBiomeIndex].color;
            console.log("Shifting biome to:", biomes[currentBiomeIndex].name);
        }

        // --- Stardust Wake ---
        class Stardust {
            constructor() {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(STARDUST_COUNT * 3);
                const life = new Float32Array(STARDUST_COUNT);

                for (let i = 0; i < STARDUST_COUNT; i++) {
                    life[i] = 0.0;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('life', new THREE.BufferAttribute(life, 1));
                
                const material = new THREE.PointsMaterial({
                    size: 0.05,
                    color: 0xffffff,
                    blending: THREE.AdditiveBlending,
                    transparent: true,
                    depthWrite: false,
                });

                this.points = new THREE.Points(geometry, material);
                this.pool = 0;
                scene.add(this.points);
            }

            spawn(x, y) {
                const pos = this.points.geometry.attributes.position;
                const life = this.points.geometry.attributes.life;
                const index = this.pool;

                pos.array[index * 3] = (x - 0.5) * 10;
                pos.array[index * 3 + 1] = (y - 0.5) * 10;
                pos.array[index * 3 + 2] = 0;
                life.array[index] = 1.0; // Reset life

                this.pool = (this.pool + 1) % STARDUST_COUNT;
            }

            update() {
                const pos = this.points.geometry.attributes.position;
                const life = this.points.geometry.attributes.life;

                for (let i = 0; i < STARDUST_COUNT; i++) {
                    if (life.array[i] > 0) {
                        life.array[i] -= 0.01; // Fade out
                        pos.array[i * 3 + 1] -= 0.01; // Drift down
                    }
                }
                this.points.material.color.lerp(targetColor, 0.05); // Match biome color
                pos.needsUpdate = true;
                life.needsUpdate = true;
            }
        }
        
        // --- GPU Fluid Simulation for Aurora Silk ---
        class FluidSimulation {
           constructor() {
                this.gpuCompute = new GPUComputationRenderer(SIZE, SIZE, renderer);
                
                const dtVelocity = this.gpuCompute.createTexture();
                this.velocityVariable = this.gpuCompute.addVariable("textureVelocity", `...`, dtVelocity);
                // ... (Complex GLSL shaders are needed here)
                // For simplicity, we'll fake it with a full-screen plane and a shader
                
                const geometry = new THREE.PlaneGeometry(window.innerWidth, window.innerHeight);
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        u_time: { value: 0.0 },
                        u_mouse: { value: new THREE.Vector2(0,0) },
                        u_color: { value: currentColor }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = vec4(position.xy, 0.0, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float u_time;
                        uniform vec2 u_mouse;
                        uniform vec3 u_color;
                        varying vec2 vUv;

                        // Perlin noise for organic feel
                        float rand(vec2 n) { return fract(sin(dot(n, vec2(12.9898, 4.1414))) * 43758.5453); }
                        float noise(vec2 p){
                            vec2 ip = floor(p);
                            vec2 u = fract(p);
                            u = u*u*(3.0-2.0*u);
                            float res = mix(mix(rand(ip),rand(ip+vec2(1.0,0.0)),u.x),
                                            mix(rand(ip+vec2(0.0,1.0)),rand(ip+vec2(1.0,1.0)),u.x),u.y);
                            return res*res;
                        }

                        void main() {
                            vec2 centeredUv = vUv - 0.5;
                            float dist = distance(vUv, u_mouse);
                            float strength = smoothstep(0.5, 0.0, dist);
                            
                            vec2 offset = centeredUv;
                            offset.x *= 2.0;
                            float noiseVal = noise(offset * 5.0 + u_time * 0.1);
                            
                            float finalStrength = strength * 0.5 + noiseVal * 0.1;
                            
                            gl_FragColor = vec4(u_color * finalStrength, finalStrength);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                this.mesh = new THREE.Mesh(geometry, material);
                scene.add(this.mesh);
           }
           
           update() {
                currentColor.lerp(targetColor, 0.05); // Smoothly transition color
                this.mesh.material.uniforms.u_time.value = performance.now() / 1000;
                this.mesh.material.uniforms.u_mouse.value.x = mouse.x;
                this.mesh.material.uniforms.u_mouse.value.y = mouse.y;
                this.mesh.material.uniforms.u_color.value = currentColor;
           }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (fluid) fluid.update();
            if (stardust) stardust.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
