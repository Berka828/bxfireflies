<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Diagnostic Test</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 20px 40px; font-size: 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #log { margin-top: 30px; padding: 20px; background: #000; color: #0f0; font-family: monospace; text-align: left; border-radius: 8px; min-height: 100px;}
        video { margin-top: 20px; max-width: 100%; border: 3px solid #444; border-radius: 8px; background: #000; }
        .error { color: #ff4444 !important; }
    </style>
</head>
<body>

    <h1>Camera Diagnostic</h1>
    <button id="testBtn">TEST CAMERA</button>
    
    <div id="log">Waiting for you to click 'Test Camera'...</div>
    
    <video id="webcam" playsinline autoplay muted width="640" height="480"></video>

    <script>
        const btn = document.getElementById('testBtn');
        const logDiv = document.getElementById('log');
        const video = document.getElementById('webcam');

        function log(msg, isError = false) {
            logDiv.innerHTML += `<div class="${isError ? 'error' : ''}">> ${msg}</div>`;
            console.log(msg);
        }

        btn.addEventListener('click', async () => {
            logDiv.innerHTML = ""; // Clear log
            log("Button clicked. Checking environment...");

            // 1. Check if we are on HTTPS
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                log("CRITICAL ERROR: You are not on HTTPS. Browsers block cameras on http://", true);
                log("Make sure your GitHub Pages link starts with https://", true);
                return;
            }

            // 2. Check if the browser supports cameras at all
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                log("CRITICAL ERROR: navigator.mediaDevices is not supported in this browser.", true);
                return;
            }

            log("Environment looks good. Requesting camera access...");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                log("Permission GRANTED! Got media stream.");
                
                video.srcObject = stream;
                log("Attached stream to video element. Waiting for video to play...");
                
                await video.play();
                log("SUCCESS! Video is now playing.");

            } catch (err) {
                log(`FAILED: ${err.name} - ${err.message}`, true);
                
                if (err.name === 'NotAllowedError') {
                    log("FIX: You clicked 'Deny', or your browser settings are permanently blocking the camera for this site. Click the lock icon next to the URL to check.", true);
                } else if (err.name === 'NotFoundError') {
                    log("FIX: No camera hardware was found. Is it plugged in?", true);
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    log("FIX: The camera is already being used by another app (like Zoom, Teams, or another browser tab). Close them and try again.", true);
                }
            }
        });
    </script>
</body>
</html>
