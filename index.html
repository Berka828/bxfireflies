<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aurora Silk - Bronx Children's Museum</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        #webcam { position: absolute; opacity: 0; pointer-events: none; width: 64px; height: 48px; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 100;
        }
        button {
            padding: 20px 50px; font-size: 24px; cursor: pointer;
            background: #6a11cb; color: white; border: none; border-radius: 50px;
            box-shadow: 0 0 20px rgba(106, 17, 203, 0.5);
        }
        #status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>Aurora Silk</h1>
        <p>A Calming Sensory Experience</p>
        <button id="startBtn">BEGIN</button>
        <div id="status">Click Begin to enable camera</div>
    </div>

    <!-- Hidden video element for tracking -->
    <video id="webcam" autoplay playsinline muted></video>

    <script>
        let scene, camera, renderer, video, videoTexture, silkMaterial;
        let mouseX = 0.5, mouseY = 0.5;
        let targetX = 0.5, targetY = 0.5;

        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const videoEl = document.getElementById('webcam');

        startBtn.addEventListener('click', async () => {
            status.innerText = "Requesting camera access...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, facingMode: "user" } 
                });
                videoEl.srcObject = stream;
                // Important: Wait for video to actually start playing
                videoEl.onloadedmetadata = () => {
                    videoEl.play();
                    status.innerText = "Camera active. Starting engine...";
                    init();
                    document.getElementById('overlay').style.display = 'none';
                };
            } catch (err) {
                status.innerText = "Error: " + err.message + ". Make sure you are on HTTPS.";
                console.error(err);
            }
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Create Video Texture
            videoTexture = new THREE.VideoTexture(videoEl);

            // The Aurora Shader
            const geometry = new THREE.PlaneGeometry(2, 2);
            silkMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uMouse: { value: new THREE.Vector2(0.5, 0.5) },
                    uColor: { value: new THREE.Color(0x4433ff) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec2 uMouse;
                    uniform vec3 uColor;
                    varying vec2 vUv;

                    // Simple noise function
                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }

                    void main() {
                        vec2 p = vUv;
                        float d = distance(p, vec2(uMouse.x, 1.0 - uMouse.y));
                        
                        // Create the "Silk" ribbon effect
                        float ribbon = 0.0;
                        for(float i=1.0; i<4.0; i++) {
                            p.x += sin(p.y * 5.0 + uTime * 0.5 * i) * 0.1;
                            float line = abs(0.01 / (p.x - uMouse.x));
                            ribbon += line * (1.0 - d);
                        }

                        vec3 finalColor = uColor * ribbon;
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const mesh = new THREE.Mesh(geometry, silkMaterial);
            scene.add(mesh);

            // Start tracking and animation
            trackMotion();
            animate();
        }

        function trackMotion() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 64;
            canvas.height = 48;

            function process() {
                if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
                    ctx.drawImage(videoEl, 0, 0, 64, 48);
                    const pixels = ctx.getImageData(0, 0, 64, 48).data;
                    
                    let brightestX = 0, brightestY = 0, maxB = 0;
                    for (let i = 0; i < pixels.length; i += 4) {
                        let b = pixels[i] + pixels[i+1] + pixels[i+2];
                        if (b > maxB) {
                            maxB = b;
                            let idx = i / 4;
                            brightestX = idx % 64;
                            brightestY = Math.floor(idx / 64);
                        }
                    }
                    // Smooth the movement so it's "Calm"
                    targetX = brightestX / 64;
                    targetY = brightestY / 48;
                }
                setTimeout(process, 50); // Track at 20fps for performance
            }
            process();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Interpolate for smooth "Silk" movement
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;

            silkMaterial.uniforms.uTime.value += 0.01;
            silkMaterial.uniforms.uMouse.value.set(mouseX, mouseY);

            // Cycle Biome Colors
            const hue = (Math.sin(Date.now() * 0.0001) * 0.5 + 0.5);
            silkMaterial.uniforms.uColor.value.setHSL(hue, 0.7, 0.5);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
