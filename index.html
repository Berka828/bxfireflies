<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Seasons of the Bronx - Interactive Mural</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #webcam { display: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 100; color: white; text-align: center;
        }
        h1 { font-size: 3.5rem; letter-spacing: 5px; font-weight: 200; margin-bottom: 10px; }
        button {
            padding: 20px 60px; font-size: 20px; cursor: pointer;
            background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50px; text-transform: uppercase; transition: 0.4s;
        }
        button:hover { background: white; color: black; box-shadow: 0 0 40px rgba(255,255,255,0.3); }
        #status { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>THE SEASONS</h1>
        <p>A Sensory Journey through the Bronx</p>
        <button id="startBtn">Enter Experience</button>
        <div id="status">Hardware check ready</div>
    </div>

    <video id="webcam" playsinline autoplay muted></video>

    <script>
        // --- SETTINGS ---
        const PARTICLE_COUNT = 100000;
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        
        // --- BIOMES (Seasons) ---
        const biomes = [
            { name: "Spring", base: 0xff69b4, accent: 0x98fb98 }, // Pink/Green
            { name: "Summer", base: 0x00ced1, accent: 0x7fff00 }, // Teal/Bright Green
            { name: "Autumn", base: 0xff4500, accent: 0xffd700 }, // Orange/Gold
            { name: "Winter", base: 0x4169e1, accent: 0xffffff }  // Blue/White
        ];
        let currentBiome = 0;

        let scene, camera, renderer, particles, motionTexture;
        let lastFrame;

        // --- START SEQUENCE ---
        startBtn.addEventListener('click', async () => {
            status.innerText = "Requesting optical sensors...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                await video.play();
                
                status.innerText = "Igniting Art Engine...";
                init();
                
                document.getElementById('overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('overlay').style.display = 'none', 1000);
            } catch (err) {
                status.innerText = "Error: " + err.message;
                status.style.color = "red";
            }
        });

        function init() {
            // 1. WEBGL SETUP
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 2. MOTION HEATMAP (The secret sauce)
            const motionCanvas = document.createElement('canvas');
            motionCanvas.width = 64; motionCanvas.height = 48;
            const mCtx = motionCanvas.getContext('2d');
            motionTexture = new THREE.CanvasTexture(motionCanvas);

            // 3. CREATE 100,000 PARTICLES
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            const uvs = new Float32Array(PARTICLE_COUNT * 2);

            for(let i=0; i<PARTICLE_COUNT; i++) {
                pos[i*3] = (Math.random() - 0.5) * 400;     // X
                pos[i*3+1] = (Math.random() - 0.5) * 300;   // Y
                pos[i*3+2] = (Math.random() - 0.5) * 50;    // Z
                
                uvs[i*2] = (pos[i*3] / 400) + 0.5;          // Map X to UV
                uvs[i*2+1] = (pos[i*3+1] / 300) + 0.5;      // Map Y to UV
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uMotion: { value: motionTexture },
                    uBaseColor: { value: new THREE.Color(biomes[0].base) },
                    uAccentColor: { value: new THREE.Color(biomes[0].accent) }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform sampler2D uMotion;
                    varying vec3 vColor;
                    uniform vec3 uBaseColor;
                    uniform vec3 uAccentColor;

                    void main() {
                        // Mirror the motion UV
                        vec2 motionUv = vec2(1.0 - uv.x, uv.y);
                        float force = texture2D(uMotion, motionUv).r;

                        vec3 p = position;
                        
                        // Ambient Breathing (Always moving even if kid is still)
                        p.x += sin(uTime * 0.5 + position.y * 0.02) * 5.0;
                        p.y += cos(uTime * 0.4 + position.x * 0.02) * 5.0;

                        // Motion Explosion
                        p.z += force * 80.0;
                        p.x += (uv.x - 0.5) * force * 50.0;

                        vColor = mix(uBaseColor, uAccentColor, force);
                        
                        vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
                        gl_PointSize = (4.0 + force * 10.0) * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = distance(gl_PointCoord, vec2(0.5));
                        if(d > 0.5) discard;
                        gl_FragColor = vec4(vColor, 0.8 * (1.0 - d*2.0));
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            // 4. MOTION LOOP
            function updateMotion() {
                mCtx.fillStyle = 'black';
                mCtx.globalAlpha = 0.15; // Slow fade for smooth trails
                mCtx.fillRect(0,0,64,48);
                mCtx.globalAlpha = 1.0;

                mCtx.drawImage(video, 0, 0, 64, 48);
                const curr = mCtx.getImageData(0,0,64,48);
                
                if(lastFrame) {
                    mCtx.fillStyle = 'white';
                    for(let i=0; i<curr.data.length; i+=4) {
                        if(Math.abs(curr.data[i] - lastFrame.data[i]) > 40) {
                            const x = (i/4)%64; const y = Math.floor((i/4)/64);
                            mCtx.fillRect(x,y,2,2);
                        }
                    }
                }
                lastFrame = curr;
                motionTexture.needsUpdate = true;
                requestAnimationFrame(updateMotion);
            }
            updateMotion();

            // 5. BIOME SWAP
            setInterval(() => {
                currentBiome = (currentBiome + 1) % biomes.length;
            }, 30000); // Swap every 30 seconds

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const u = particles.material.uniforms;
            u.uTime.value += 0.01;

            // Smooth color transition
            const targetBase = new THREE.Color(biomes[currentBiome].base);
            const targetAccent = new THREE.Color(biomes[currentBiome].accent);
            u.uBaseColor.value.lerp(targetBase, 0.02);
            u.uAccentColor.value.lerp(targetAccent, 0.02);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
