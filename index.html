<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bronx Children's Museum - River Mirror</title>
    <style>
        /* Make the canvas fill the entire screen and hide scrollbars */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000; /* Deep black background */
        }
        /* Hide the actual video element, we only want to see the 3D particles */
        #webcam {
            display: none;
        }
    </style>
    <!-- Load Three.js library directly from the web -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <script>
        // 1. SET UP THE 3D SCENE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 100;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. SET UP THE WEBCAM
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(function(stream) {
                video.srcObject = stream;
                video.play();
            })
            .catch(function(err) {
                console.error("Camera access denied or not found:", err);
                alert("Please allow camera access to see the experience.");
            });

        // Turn the webcam video into a texture that Three.js can read
        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBFormat;

        // 3. CREATE 65,000 PARTICLES (256 x 256 grid)
        const size = 256;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(size * size * 3);
        const uvs = new Float32Array(size * size * 2);

        let index = 0;
        let uvIndex = 0;
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                // Arrange particles in a grid covering the screen
                positions[index++] = (i / size - 0.5) * 200; // X
                positions[index++] = (j / size - 0.5) * 150; // Y
                positions[index++] = 0;                      // Z (will be changed by the shader)

                // UV coordinates to map the webcam video to the particles
                uvs[uvIndex++] = i / size;
                uvs[uvIndex++] = j / size;
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

        // 4. WRITE THE "MAGIC" SHADERS 
        // This makes the particles pop out based on motion/brightness and tints them river colors
        const material = new THREE.ShaderMaterial({
            uniforms: {
                u_texture: { value: videoTexture }
            },
            vertexShader: `
                uniform sampler2D u_texture;
                varying vec2 vUv;
                varying vec3 vColor;
                
                void main() {
                    vUv = uv;
                    // Flip the camera horizontally so it acts like a mirror
                    vec2 mirrorUv = vec2(1.0 - vUv.x, vUv.y); 
                    
                    // Get the color of the webcam pixel
                    vec4 camColor = texture2D(u_texture, mirrorUv);
                    
                    // Calculate brightness to push the particle forward in 3D space
                    float brightness = (camColor.r + camColor.g + camColor.b) / 3.0;
                    
                    // Tint the particle glowing River Blue/Green based on the webcam color
                    vColor = vec3(camColor.r * 0.2, camColor.g * 0.8, camColor.b * 1.5);
                    
                    vec3 newPosition = position;
                    newPosition.z += brightness * 40.0; // How far the 3D effect pops out

                    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    gl_PointSize = 3.0; // Size of each particle
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    // Make the particles circles instead of squares
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if (ll > 0.5) discard;
                    
                    gl_FragColor = vec4(vColor, 1.0);
                }
            `
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // 5. ANIMATE AND RENDER THE SCENE
        function animate() {
            requestAnimationFrame(animate);
            
            // Slowly rotate the camera slightly to show off the 3D depth
            camera.position.x = Math.sin(Date.now() * 0.0005) * 20;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resizing to keep the theater screen fullscreen
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
